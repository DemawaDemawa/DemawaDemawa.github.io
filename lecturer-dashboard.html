<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lecturer Dashboard</title>
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">
    <img src="assets/logo.png" alt="logo" width="20%">
  </div>
  <div class="user">
    <label id="lbusername">username</label>
  </div>
</div>

<!-- NAVIGATION -->
<header class="header">
  <button class="menu-toggle">☰</button>
  <nav class="nav">
    <a href="lecturer-dashboard.html">Dashboard</a>
    <a href="#">My Courses</a>
    <a href="#">Attendance</a>
    <a href="javascript:void(0)" onclick="logout()">Logout</a>
  </nav>
</header>

<main class="container">
  <div class="cards-grid">
    <div class="card">
      <h3>Welcome Lecturer</h3>
      <p id="lbLecturerName" class="stat-number"></p>
    </div>
    <div class="card">
      <h3>Total Courses</h3>
      <p id="lbLecturerCourses" class="stat-number"><span class="loader"></span></p>
    </div>
    <div class="card">
      <h3>Students</h3>
      <p id="lbLecturerStudents" class="stat-number"><span class="loader"></span></p>
    </div>
    <div class="card">
      <h3>Account Status</h3>
      <p id="lbLecturerStatus" class="stat-number"><span class="loader"></span></p>
    </div>
  </div>
</main>

<footer class="footer">
  <p>© 2026 DEMAWA Lecturer Portal</p>
</footer>
<script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/7.16.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/config.js"></script>
<script src="js/lecturer.js"></script>
<script>
  const menuToggle = document.querySelector('.menu-toggle');
  const nav = document.querySelector('.nav');
  menuToggle.addEventListener('click', () => {
    nav.classList.toggle('active');
    menuToggle.textContent = nav.classList.contains('active') ? "✖" : "☰";
  });
</script>
</body>
</html>
