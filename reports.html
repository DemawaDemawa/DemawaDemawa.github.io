<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Reports</title>
  <link rel="stylesheet" href="css/dashboard.css">
  <style>
    @media print {
      body * {
        visibility: hidden;
      }
      #Reports, #Reports * {
        visibility: visible;
      }
      #Reports {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        padding: 0;
        margin: 0;
      }
      #Reports .cards-grid {
        display: block;
      }
      #Reports .card {
        width: 100% !important;
        margin: 0 0 20px !important;
        box-sizing: border-box;
        page-break-inside: avoid;
        break-inside: avoid;
      }
      #Reports canvas {
        max-width: 100% !important;
        height: auto !important;
        display: block;
        margin: 0 auto;
      }
    }
    .print-btn {
      margin: 16px;
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">
    <img src="assets/logo.png" alt="logo" width="20%">
  </div>
  <div class="user">
    <label id="lbusername">username</label>
  </div>
</div>

<!-- NAVIGATION -->
<header class="header">
  <button class="menu-toggle">☰</button>
  <nav class="nav">
    <a href="#">Dashboard</a>
    <a href="courses.html">Courses</a>
    <a href="students.html">Students</a>
    <a href="admins.html">Admins</a>
    <a href="lecturers.html">Lecturers</a>
    <a href="gps.html">GPS</a>
    <a href="reports.html">Reports</a>
    <a href="javascript:void(0)" onclick="logout()">Logout</a>
  </nav>
</header>

<div style="display: none;" id="loading" class="loading">
  <div style="border: 16px solid #f3f3f3; border-top: 16px solid #3498db; border-radius: 50%; width: 120px; height: 120px; animation: spin 1s linear infinite; margin: 50vh auto;"></div>
</div>
<style>
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>

<!-- MAIN -->
<main class="container" id="Reports">

 <!-- Cards -->
<div class="cards-grid">

  <div class="card">
    <h3>Total Users chart</h3>
    <canvas id="mybargraph"></canvas>
</div>

  <div class="card">
    <h3>Courses</h3>
    <canvas id="mycourseschart"></canvas>
    </p>
  </div>

  <div class="card">
    <h3>Lecturers</h3>
    <canvas class="mylecturerchart" id="mylecturerchart"></canvas>
    </p>
  </div>

  <div class="card">
    <h3>Students</h3>
    <canvas class="mystudentschart" id="mystudentschart"></canvas>
    </p>
  </div>

</div>
</main>
<button onclick="printReports()" class="btn-primary btngreen print-btn">Print Reports</button>
<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 DEMAWA Admin Panel</p>
</footer>
<script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/7.16.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/config.js"></script>
<!-- Change 'jsdeliver' to 'jsdelivr' -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/reports.js"></script>
<script>
function printReports() {
  window.print();
}

  const menuToggle = document.querySelector('.menu-toggle');
  const nav = document.querySelector('.nav');
  menuToggle.addEventListener('click', () => {
    nav.classList.toggle('active');
    menuToggle.textContent = nav.classList.contains('active') ? "✖" : "☰";
  });

let lbusername = document.getElementById('lbusername')
auth.onAuthStateChanged( function (user) {
  if (user) {
    lbusername.innerHTML= user.email
  }else{
    window.location.href ="index.html"
  }
})
</script>

</body>
</html>
