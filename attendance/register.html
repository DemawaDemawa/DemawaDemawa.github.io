<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div class="main">
        <div class="logo">
            <img src="assets/logo.jpg" alt="Logo" width="100%">
        </div>
        <div class="card">
                <h2>Register for Attendance System</h2>
                <form enctype="multipart/form-data">
                    <div class="form-group">
                        <label for="firstname">Enter First Name</label>
                        <input class="input" id="firstname" name="firstname" required placeholder="Enter your first name">
                    </div>
                    <div class="form-group">
                        <label for="lastname">Enter Last Name</label>
                        <input class="input" id="lastname" name="lastname" required placeholder="Enter your last name">
                    </div>
                    <div class="form-group">
                        <label for="email">Enter Email</label>
                        <input class="input" id="email" name="email" required placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input class="input" type="password" id="password" name="password" required placeholder="******">
                    </div>
                    <div class="form-group">
                        <label for="confirm_password">Confirm Password</label>
                        <input class="input" type="password" id="confirm_password" name="confirm_password" required placeholder="******">
                    </div>
                    <button class="btn-primary">Register</button>
                    <button class="btn-register"><a href="index.html">Already have an account? Login</a></button>
                    <button class="btn-forgot"><a href="reset.html">Forgot Password?</a></button>
                </form>
            
            
        </div>
    </div>
    
</body>
</html>
