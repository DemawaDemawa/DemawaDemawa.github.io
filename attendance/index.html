<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance System</title>
    //creating a favicon
    
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div class="main">
        <div class="logo">
            <img src="assets/logo.jpg" alt="Logo" width="100%">
        </div>
        <div class="card">
                <h2>Welcome to Attendance System</h2>
                <form enctype="multipart/form-data">
                    <div class="form-group">
                        <label for="username">Enter Username</label>
                        <input class="input" id="username" name="username" required placeholder="Enter your username">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input class="input" type="password" id="password" name="password" required placeholder="******">
                    </div>
                    <button class="btn-primary">Login</button>
                    <button class="btn-register"><a href="register.html">Dont have account? Register Now</a></button>
                    <button class="btn-forgot"><a href="reset.html">Forgot Password?</a></button>
                </form>
            
            
        </div>
    </div>
    
</body>
</html>
