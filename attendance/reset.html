<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div class="main">
        <div class="logo">
            <img src="assets/logo.jpg" alt="Logo" width="100%">
        </div>
        <div class="card">
                <h2>Reset Password</h2>
                <form enctype="multipart/form-data">
                    <div class="form-group">
                        <label for="email">Enter Email</label>
                        <input class="input" id="email" name="email" required placeholder="Enter your email">
                    </div>
                    <button class="btn-primary">Send Reset Link</button>
                    <button class="btn-register"><a href="index.html">Back to Login</a></button>

                </form>
            
            
        </div>
    </div>
    
</body>
</html>
